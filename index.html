<!DOCTYPE html>
<html>
<head>
<title>DAILY DISPATCH PLAN</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="300">

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 50px;
  background:rgba(255,255,255,0.08);
}

h1{
  font-size:34px;
  margin:0;
}

#totalQty{
  font-size:24px;
  background:rgba(255,255,255,0.2);
  padding:10px 20px;
  border-radius:30px;
  font-weight:bold;
}

#wrap{
  height:70vh;
  margin:20px 40px;
  padding:20px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:17px;
}

th{
  background:rgba(0,0,0,0.7);
  padding:10px;
  position:sticky;
  top:0;
}

td{
  padding:10px;
  text-align:center;
}

tr:nth-child(even){
  background:rgba(255,255,255,0.05);
}

.badge{
  padding:5px 12px;
  border-radius:20px;
  font-weight:bold;
}

.green{ background:#00c853; }
.red{ background:#ff1744; }

.today{
  background:#ffd600 !important;
  color:black;
  font-weight:bold;
}

.overdue{
  background:#b71c1c !important;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}
</style>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

function clean(value){
  return value.replace(/"/g,'').trim();
}

function parseDate(value){
  if(!value) return null;

  value = clean(value);

  const parts = value.split("-");
  if(parts.length !== 2) return null;

  const day = parseInt(parts[0]);
  const monthText = parts[1].toLowerCase();

  const months = {
    jan:0,feb:1,mar:2,apr:3,may:4,jun:5,
    jul:6,aug:7,sep:8,oct:9,nov:10,dec:11
  };

  const month = months[monthText];
  if(month === undefined) return null;

  // FORCE 2026 because sheet is March-26
  return new Date(2026, month, day);
}

fetch(SHEET_URL)
.then(res => res.text())
.then(data => {

  const rows = data.split("\n").map(r => r.split(","));

  rows.splice(0,2);

  let totalQty = 0;
  let html = "<table><tr><th>SI NO</th><th>CUSTOMER</th><th>SCHEDULE DATE</th><th>ITEM CODE</th><th>ITEM NAME</th><th>PRODUCT</th><th>PROJECT MANAGER</th><th>SCH QTY</th><th>STATUS</th></tr>";

  const today = new Date();
  today.setHours(0,0,0,0);

  rows.forEach(r => {

    if(r.length < 8) return;
    if(!r[0]) return;

    const qty = parseInt(clean(r[7]));
    const date = parseDate(r[2]);

    if(isNaN(qty) || !date) return;

    totalQty += qty;

    let status = "";
    let rowClass = "";

    if(date < today){
      status = "OVERDUE";
      rowClass = "overdue";
    }
    else if(date.getTime() === today.getTime()){
      status = "TODAY";
      rowClass = "today";
    }
    else{
      status = "UPCOMING";
      rowClass = "upcoming";
    }

    html += "<tr class='"+rowClass+"'>";
    for(let i=0;i<8;i++){
      html += "<td>"+clean(r[i])+"</td>";
    }
    html += "<td>"+status+"</td></tr>";

  });

  html += "</table>";

  document.getElementById("tableContainer").innerHTML = html;
  document.getElementById("totalQty").innerText = "Total Qty: " + totalQty;

})
.catch(err => console.log(err));

</script>
</head>

<body>

<header>
  <h1>DAILY DISPATCH PLAN</h1>
  <div id="totalQty">Loading...</div>
</header>

<div id="wrap">
  <div id="scroll"></div>
</div>

</body>
</html>
