<!DOCTYPE html>
<html>
<head>
<title>DAILY DISPATCH PLAN</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="300">

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 50px;
  background:rgba(255,255,255,0.08);
}

h1{
  font-size:34px;
  margin:0;
}

#totalQty{
  font-size:24px;
  background:rgba(255,255,255,0.2);
  padding:10px 20px;
  border-radius:30px;
  font-weight:bold;
}

#wrap{
  height:70vh;
  margin:20px 40px;
  padding:20px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:17px;
}

th{
  background:rgba(0,0,0,0.7);
  padding:10px;
  position:sticky;
  top:0;
}

td{
  padding:10px;
  text-align:center;
}

tr:nth-child(even){
  background:rgba(255,255,255,0.05);
}

.badge{
  padding:5px 12px;
  border-radius:20px;
  font-weight:bold;
}

.green{ background:#00c853; }
.red{ background:#ff1744; }

.today{
  background:#ffd600 !important;
  color:black;
  font-weight:bold;
}

.overdue{
  background:#b71c1c !important;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}
</style>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

// Parse TAB separated CSV correctly
function parseCSV(text){
  return text.split("\n").map(row => row.split("\t"));
}

// Parse "2-Mar" format using current year
function parseDate(value){
  if(!value) return null;

  value = value.trim();
  const parts = value.split("-");

  if(parts.length === 2){
    const day = parseInt(parts[0]);
    const monthText = parts[1].toLowerCase();

    const months = {
      jan:0,feb:1,mar:2,apr:3,may:4,jun:5,
      jul:6,aug:7,sep:8,oct:9,nov:10,dec:11
    };

    const month = months[monthText];
    if(month === undefined) return null;

    const year = new Date().getFullYear();
    return new Date(year, month, day);
  }

  return null;
}

fetch(SHEET_URL)
.then(res => res.text())
.then(text => {

  const rows = parseCSV(text.trim());

  rows.shift(); // remove title row
  rows.shift(); // remove header row

  let totalQty = 0;
  let processedRows = [];

  const today = new Date();
  today.setHours(0,0,0,0);

  rows.forEach(r => {

    if(r.length < 8) return;

    const qty = parseInt(r[7]);
    const date = parseDate(r[2]);

    if(isNaN(qty) || !date) return;

    totalQty += qty;
    processedRows.push([r, date]);
  });

  processedRows.sort((a,b) => a[1] - b[1]);

  document.getElementById("totalQty").innerText = "Total Qty: " + totalQty;

  let html = "<table><tr>"+
    "<th>SI NO</th><th>CUSTOMER</th><th>SCHEDULE DATE</th>"+
    "<th>ITEM CODE</th><th>ITEM NAME</th>"+
    "<th>PRODUCT</th><th>PROJECT MANAGER</th>"+
    "<th>SCH QTY</th><th>STATUS</th></tr>";

  processedRows.forEach(item => {

    const r = item[0];
    const d = item[1];

    let rowClass = "";
    let statusBadge = "";

    if(d < today){
      rowClass = "overdue";
      statusBadge = `<span class="badge red">OVERDUE</span>`;
    }
    else if(d.getTime() === today.getTime()){
      rowClass = "today";
      statusBadge = `<span class="badge green">TODAY</span>`;
    }
    else{
      statusBadge = `<span class="badge green">UPCOMING</span>`;
    }

    html += `<tr class="${rowClass}">
      <td>${r[0]}</td>
      <td>${r[1]}</td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td>${r[4]}</td>
      <td>${r[5]}</td>
      <td>${r[6]}</td>
      <td>${r[7]}</td>
      <td>${statusBadge}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("scroll").innerHTML = html;

})
.catch(err => console.error(err));

</script>
</head>

<body>

<header>
  <h1>DAILY DISPATCH PLAN</h1>
  <div id="totalQty">Loading...</div>
</header>

<div id="wrap">
  <div id="scroll"></div>
</div>

</body>
</html>
