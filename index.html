<!DOCTYPE html>
<html>
<head>
<title>DAILY DISPATCH PLAN</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="300">

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 50px;
  background:rgba(255,255,255,0.08);
}

h1{
  font-size:34px;
  margin:0;
}

#totalQty{
  font-size:24px;
  background:rgba(255,255,255,0.2);
  padding:10px 20px;
  border-radius:30px;
  font-weight:bold;
}

#wrap{
  height:70vh;
  margin:20px 40px;
  padding:20px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:17px;
}

th{
  background:rgba(0,0,0,0.7);
  padding:10px;
  position:sticky;
  top:0;
}

td{
  padding:10px;
  text-align:center;
}

tr:nth-child(even){
  background:rgba(255,255,255,0.05);
}

.badge{
  padding:5px 12px;
  border-radius:20px;
  font-weight:bold;
}

.green{ background:#00c853; }
.red{ background:#ff1744; }

.today{
  background:#ffd600 !important;
  color:black;
  font-weight:bold;
}

.overdue{
  background:#b71c1c !important;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}
</style>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

function parseCSV(text){
  return text.split("\n").map(row => row.split(","));
}

// Universal Date Parser
function parseDate(value){
  if(!value) return null;

  value = value.trim();

  // Google serial date support
  if(!isNaN(value)){
    const excelDate = parseInt(value);
    return new Date((excelDate - 25569) * 86400 * 1000);
  }

  // Standard parsing
  let d = new Date(value);
  if(!isNaN(d)) return d;

  // DD/MM/YYYY or DD-MM-YYYY
  let parts = value.split(/[\/\-]/);
  if(parts.length === 3){
    return new Date(parts[2], parts[1]-1, parts[0]);
  }

  return null;
}

fetch(SHEET_URL)
.then(response => response.text())
.then(csv => {

  const rows = parseCSV(csv.trim());

  rows.shift(); // remove title row
  rows.shift(); // remove header row

  let totalQty = 0;
  let processedRows = [];

  const today = new Date();
  today.setHours(0,0,0,0);

  rows.forEach(r => {

    if(r.length < 8) return;

    const qty = parseInt(r[7]);
    const date = parseDate(r[2]);

    if(isNaN(qty) || !date) return;

    totalQty += qty;
    processedRows.push([r, date]);
  });

  processedRows.sort((a,b) => a[1] - b[1]);

  document.getElementById("totalQty").innerText = "Total Qty: " + totalQty;

  let tableHTML = "<table><tr>"+
    "<th>SL NO</th><th>CUSTOMER</th><th>SCHEDULE DATE</th>"+
    "<th>ITEM CODE</th><th>ITEM NAME</th>"+
    "<th>PRODUCT</th><th>PROJECT MANAGER</th>"+
    "<th>SCH QTY</th><th>STATUS</th></tr>";

  processedRows.forEach(item => {

    const r = item[0];
    const d = item[1];

    const compareDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const currentDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());

    let rowClass = "";
    let statusBadge = "";

    if(compareDate.getTime() < currentDate.getTime()){
      rowClass = "overdue";
      statusBadge = `<span class="badge red">OVERDUE</span>`;
    }
    else if(compareDate.getTime() === currentDate.getTime()){
      rowClass = "today";
      statusBadge = `<span class="badge green">TODAY</span>`;
    }
    else{
      statusBadge = `<span class="badge green">UPCOMING</span>`;
    }

    tableHTML += `<tr class="${rowClass}">
      <td>${r[0]}</td>
      <td>${r[1]}</td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td>${r[4]}</td>
      <td>${r[5]}</td>
      <td>${r[6]}</td>
      <td>${r[7]}</td>
      <td>${statusBadge}</td>
    </tr>`;
  });

  tableHTML += "</table>";
  document.getElementById("scroll").innerHTML = tableHTML;

})
.catch(error => {
  console.error("Error loading sheet:", error);
});

</script>
</head>

<body>

<header>
  <h1>DAILY DISPATCH PLAN</h1>
  <div id="totalQty">Loading...</div>
</header>

<div id="wrap">
  <div id="scroll"></div>
</div>

</body>
</html>
