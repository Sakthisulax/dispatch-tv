<!DOCTYPE html>
<html>
<head>
    <title>DAILY DISPATCH PLAN</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            background: #0b0f14;
            color: white;
            font-family: Arial;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #333;
            padding: 5px;
            text-align: center;
        }

        th {
            background: yellow;
            color: black;
        }

        .graph {
            width: 90%;
            margin: 20px auto;
            background: #1c1f26;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>Live Dispatch Dashboard</h1>

<table id="dispatchTable"></table>

<div class="graph">
    <canvas id="chart"></canvas>
</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1-MzOK58kPnIZInwA4tXSTo3-LNIplSvSXSGZoiMRjb4/edit?gid=0#gid=0"; // 🔥 PUT YOUR LINK HERE
let chart; // ✅ prevent duplicate chart

// FORMAT DATE LIKE 20/Mar
function formatDate(d) {
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return d.getDate() + "/" + months[d.getMonth()];
}

async function loadData() {

    try {
        let res = await fetch(sheetURL);
        let data = await res.text();

        let rows = data.trim().split("\n").map(r => r.split(","));

        let table = document.getElementById("dispatchTable");
        table.innerHTML = "";

        // HEADER
        let header = "<tr>";
        rows[0].forEach(col => header += `<th>${col}</th>`);
        header += "</tr>";
        table.innerHTML += header;

        let today = formatDate(new Date());
        let yesterdayDate = new Date();
        yesterdayDate.setDate(yesterdayDate.getDate() - 1);
        let yesterday = formatDate(yesterdayDate);

        let customerData = {};

        // LOOP DATA
        for (let i = 1; i < rows.length; i++) {

            let row = rows[i];
            if (row.length < 9) continue;

            let customer = row[1]?.trim();
            let date = row[2]?.trim();
            let sch = parseInt(row[7]) || 0;
            let des = parseInt(row[8]) || 0;

            // ADD TABLE ROW
            let tr = "<tr>";
            row.forEach(c => tr += `<td>${c}</td>`);
            tr += "</tr>";
            table.innerHTML += tr;

            // FILTER TODAY + YESTERDAY
            if (date === today || date === yesterday) {

                if (!customerData[customer]) {
                    customerData[customer] = { sch: 0, des: 0 };
                }

                customerData[customer].sch += sch;
                customerData[customer].des += des;
            }
        }

        let customers = Object.keys(customerData);
        let schData = customers.map(c => customerData[c].sch);
        let desData = customers.map(c => customerData[c].des);

        // DESTROY OLD CHART (IMPORTANT FIX)
        if (chart) {
            chart.destroy();
        }

        // CREATE GRAPH
        chart = new Chart(document.getElementById("chart"), {
            type: "bar",
            data: {
                labels: customers,
                datasets: [
                    {
                        label: "SCH QTY",
                        data: schData,
                        backgroundColor: "#3498db"
                    },
                    {
                        label: "DES QTY",
                        data: desData,
                        backgroundColor: "#e74c3c"
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: { color: "white", font: { size: 14 } }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: "white" }
                    },
                    y: {
                        ticks: { color: "white" }
                    }
                }
            }
        });

    } catch (err) {
        console.error("Error loading sheet:", err);
    }
}

// LOAD FIRST TIME
loadData();

// AUTO REFRESH EVERY 60 SEC
setInterval(loadData, 60000);

</script>

</body>
</html>
