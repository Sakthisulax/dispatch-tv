<!DOCTYPE html>
<html>
<head>
    <title>Dispatch TV Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #444;
            padding: 10px;
            text-align: center;
            font-size: 18px;
        }

        th {
            background-color: #222;
        }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        canvas {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
        }

        #achievement {
            text-align: center;
            font-size: 28px;
            margin-top: 15px;
            color: #00ffcc;
        }
    </style>
</head>

<body>

<h1>Daily Dispatch Plan</h1>

<!-- TABLE -->
<table id="dispatchTable">
    <tr>
        <th>Date</th>
        <th>Planned</th>
        <th>Actual</th>
    </tr>

    <tr><td>Mon</td><td>120</td><td>100</td></tr>
    <tr><td>Tue</td><td>150</td><td>140</td></tr>
    <tr><td>Wed</td><td>130</td><td>120</td></tr>
    <tr><td>Thu</td><td>170</td><td>150</td></tr>
    <tr><td>Fri</td><td>160</td><td>155</td></tr>
</table>

<!-- ACHIEVEMENT -->
<h2 id="achievement"></h2>

<!-- CHARTS -->
<div class="container">
    <canvas id="barChart"></canvas>
    <canvas id="lineChart"></canvas>
</div>

<script>

// GET TABLE DATA
function getTableData() {
    let table = document.getElementById("dispatchTable");
    let labels = [];
    let planned = [];
    let actual = [];

    for (let i = 1; i < table.rows.length; i++) {
        labels.push(table.rows[i].cells[0].innerText);
        planned.push(parseInt(table.rows[i].cells[1].innerText));
        actual.push(parseInt(table.rows[i].cells[2].innerText));
    }

    return { labels, planned, actual };
}

const data = getTableData();


// BAR CHART
new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
        labels: data.labels,
        datasets: [
            {
                label: 'Planned',
                data: data.planned,
                backgroundColor: '#3498db'
            },
            {
                label: 'Actual',
                data: data.actual,
                backgroundColor: '#2ecc71'
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: { color: 'white', font: { size: 16 } }
            }
        },
        scales: {
            x: {
                ticks: { color: 'white', font: { size: 14 } }
            },
            y: {
                ticks: { color: 'white', font: { size: 14 } }
            }
        }
    }
});


// LINE CHART
new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
        labels: data.labels,
        datasets: [
            {
                label: 'Planned',
                data: data.planned,
                borderColor: '#3498db',
                fill: false
            },
            {
                label: 'Actual',
                data: data.actual,
                borderColor: '#2ecc71',
                fill: false
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: { color: 'white', font: { size: 16 } }
            }
        },
        scales: {
            x: {
                ticks: { color: 'white' }
            },
            y: {
                ticks: { color: 'white' }
            }
        }
    }
});


// ACHIEVEMENT %
let totalPlanned = data.planned.reduce((a,b)=>a+b,0);
let totalActual = data.actual.reduce((a,b)=>a+b,0);

let percent = ((totalActual / totalPlanned) * 100).toFixed(1);

document.getElementById("achievement").innerText =
    "Achievement: " + percent + "%";


// AUTO REFRESH (TV)
setInterval(() => {
    location.reload();
}, 60000);

</script>

</body>
</html>
