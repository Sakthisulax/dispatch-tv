<!DOCTYPE html>
<html>
<head>
  <title>Dispatch One Page Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }

    .topbar {
      display:flex; justify-content:space-between;
      padding:8px 15px; font-size:16px;
    }

    .tiles {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:8px;
      padding:8px;
    }

    .tile {
      padding:10px;
      border-radius:8px;
      text-align:center;
      font-size:14px;
    }

    .blue { background:#2563eb; }
    .green { background:#16a34a; }
    .red { background:#dc2626; }
    .orange { background:#ea580c; }

    .charts {
      display:grid;
      grid-template-columns: 1fr;
      gap:8px;
      padding:8px;
    }

    canvas {
      background:white;
      border-radius:8px;
      padding:5px;
      height:180px !important;
    }

    .table-container {
      height:180px;
      overflow:hidden;
      margin:8px;
      background:white;
      color:black;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:11px;
    }

    th, td {
      border:1px solid #ccc;
      padding:4px;
      text-align:center;
    }

    th {
      background:black;
      color:white;
      position:sticky;
      top:0;
    }

    .ok { background:#22c55e; color:white; }
    .pending { background:#ef4444; color:white; }

    .matrix {
      margin:8px;
      background:white;
      color:black;
      overflow-x:auto;
    }

    .matrix table { font-size:10px; }

    .greenCell { background:#22c55e; color:white; }
    .redCell { background:#ef4444; color:white; }

    .error {
      color:#ffcccb;
      text-align:center;
      padding:10px;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>📦 Dispatch Dashboard</div>
  <div id="clock"></div>
</div>

<div class="tiles">
  <div class="tile blue">Total<br><span id="total">0</span></div>
  <div class="tile green">Dispatched<br><span id="disp">0</span></div>
  <div class="tile red">Pending<br><span id="pend">0</span></div>
  <div class="tile orange">Today<br><span id="today">0</span></div>
</div>

<div class="charts">
  <canvas id="chart2"></canvas>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Customer</th>
        <th>Date</th>
        <th>Item</th>
        <th>Qty</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="matrix">
  <table>
    <thead id="mhead"></thead>
    <tbody id="mbody"></tbody>
  </table>
</div>

<div id="errorBox" class="error"></div>

<script>

// ⚠️ IMPORTANT: Ensure this Google Sheet is PUBLIC (Anyone with link)
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv"; // ✅ Verified link

setInterval(()=>{
  document.getElementById("clock").innerText=new Date().toLocaleString();
},1000);

function getLast7Days(){
  let d=[];
  for(let i=6;i>=0;i--){
    let dt=new Date();
    dt.setDate(dt.getDate()-i);
    d.push(dt.toLocaleDateString("en-GB"));
  }
  return d;
}

async function loadData(){
  // Detect if running from local file (file://) which blocks fetch
  if(location.protocol === 'file:'){
    document.getElementById("errorBox").innerText =
      "⚠️ Running in local file preview. Google Sheet will not load. Please host using Live Server or GitHub Pages.";
  }
  try{
    const res = await fetch(url);

    if(!res.ok){
      throw new Error("Sheet not accessible (Check sharing settings)");
    }

    const data = await res.text();

    if(!data || data.trim().length === 0){
      throw new Error("No data received from sheet");
    }

    processData(data);

  }catch(err){
    console.error(err);
    document.getElementById("errorBox").innerText =
      "❌ Data Load Failed: " + err.message +
      " | Check: Internet / Sheet Public Access";

    // FALLBACK TEST DATA (so UI won't break)
    processData(`
ID,Customer,Date,x,x,Item,x,Qty,Remark
1,Test Customer,01/04/2026,, ,Item A,,10,Dispatched
2,Test Customer,02/04/2026,, ,Item B,,5,Pending
3,ABC Ltd,02/04/2026,, ,Item C,,8,Dispatched
    `);
  }
}

function processData(data){

  const rows=data.replace(/
/g,"").split("\n").slice(1);

  let total=0,disp=0,pend=0,today=0;
  let custPending={}, custDispatch={}, dataset={};

  const todayStr=new Date().toDateString();
  const lastDays=getLast7Days();

  rows.forEach(r=>{
    let c=r.split(",");
    if(c.length<9) return;

    let customer=(c[1]||"").trim();
    let date=(c[2]||"").trim(); // e.g. 5-Mar
    let qty=parseInt(c[7])||0; // SCH QTY column correct
    let remark=(c[8]||"").toLowerCase().trim();

    // Treat READY as dispatched
    let isDis = (remark === "dispatched" || remark === "ready");

    // TOTAL LOGIC: Scheduled vs Dispatched

    total+=qty;
    if(isDis){
      disp+=qty;
      if(new Date(date).toDateString()===todayStr) today+=qty;
    } else {
      pend+=qty;
    }

    if(!custPending[customer]) custPending[customer]=0;
    if(!custDispatch[customer]) custDispatch[customer]=0;

    // Scheduled = total qty
    custPending[customer] += qty;

    // Dispatched = only ready/dispatched
    if(isDis) custDispatch[customer] += qty;

    let tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${customer}</td>
      <td>${date}</td>
      <td>${c[5]||''}</td>
      <td>${qty}</td>
      <td class="${isDis?'ok':'pending'}">${remark}</td>
    `;
    document.getElementById("tbody").appendChild(tr);

    let formattedDate; try{ formattedDate = new Date(date).toLocaleDateString("en-GB"); }catch{ formattedDate = date; }
    if(!lastDays.includes(formattedDate)) return;

    if(!dataset[customer]) dataset[customer]={};
    if(!dataset[customer][formattedDate]) dataset[customer][formattedDate]={sch:0,dis:0};

    dataset[customer][formattedDate].sch+=qty;
    if(isDis) dataset[customer][formattedDate].dis+=qty;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("disp").innerText=disp;
  document.getElementById("pend").innerText=pend;
  document.getElementById("today").innerText=today;

  new Chart(chart2,{
    type:"bar",
    data:{
      labels:Object.keys(custPending),
      datasets:[
        {label:"Scheduled Qty", data:Object.values(custPending)},
        {label:"Dispatched Qty", data:Object.values(custDispatch)}
      ]
    }
  });

  let h1="<tr><th>Customer</th>";
  lastDays.forEach(d=>h1+=`<th>${d}</th>`);
  h1+="</tr>";

  document.getElementById("mhead").innerHTML=h1;

  let body="";
  Object.keys(dataset).forEach(cust=>{
    let row=`<tr><td>${cust}</td>`;
    lastDays.forEach(d=>{
      let dis=dataset[cust]?.[d]?.dis||0;
      let sch=dataset[cust]?.[d]?.sch||0;

      let cls = dis>=sch ? "greenCell" : "redCell";
      row+=`<td class="${cls}">${dis}/${sch}</td>`;
    });
    row+="</tr>";
    body+=row;
  });

  document.getElementById("mbody").innerHTML=body;
}

loadData();

// AUTO SCROLL
let scroll=0;
setInterval(()=>{
  let c=document.querySelector(".table-container");
  if(!c) return;
  scroll+=1;
  c.scrollTop=scroll;
  if(scroll>=c.scrollHeight-c.clientHeight) scroll=0;
},50);

setInterval(()=>location.reload(),60000);

</script>

</body>
</html>
