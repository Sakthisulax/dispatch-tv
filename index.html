<!DOCTYPE html>
<html>
<head>
<title>DAILY DISPATCH PLAN</title>
<meta http-equiv="refresh" content="300">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 60px;
background:rgba(255,255,255,0.08);
}

h1{margin:0;font-size:48px;}

#totalQty{
font-size:30px;
background:rgba(255,255,255,0.2);
padding:12px 25px;
border-radius:30px;
font-weight:bold;
}

/* TOP */

#topSection{
display:flex;
gap:20px;
padding:20px 60px;
}

#chartContainer{
width:40%;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
}

#summaryTable{
width:60%;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
}

.summary-table{
width:100%;
border-collapse:collapse;
font-size:22px;
background:#fff;
color:#000;
}

.summary-table th{
background:#000;
color:#fff;
padding:12px;
}

.summary-table td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

/* MAIN TABLE */

#tableContainer{
margin:20px 60px;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
height:60vh;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
font-size:28px;
background:#fff;
color:#000;
}

th{
background:#000;
color:#fff;
position:sticky;
top:0;
padding:18px;
}

td{
padding:18px;
text-align:center;
border-bottom:1px solid #ddd;
}

.today{background:#ffeb3b;font-weight:bold;}
.overdue{font-weight:bold;}
.upcoming{background:#2e7d32;color:#fff;}
.dispatched{background:#00c853;color:#fff;font-weight:bold;}

.blink{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.3;}}

</style>
</head>

<body>

<header>
<h1>DAILY DISPATCH PLAN</h1>
<div id="totalQty">Loading...</div>
</header>

<div id="topSection">

<div id="chartContainer">
<h3 style="text-align:center;">CUSTOMER WISE DISPATCH OTD</h3>
<canvas id="chart"></canvas>
</div>

<div id="summaryTable">
<h3 style="text-align:center;">CUSTOMER SUMMARY</h3>
<div id="summaryContent">Loading...</div>
</div>

</div>

<div id="tableContainer">Loading...</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

function clean(v){
return v ? v.replace(/"/g,'').trim() : "";
}

/* ✅ FIXED DATE PARSE */
function parseDate(v){
v=clean(v);
if(!v) return null;

let parts=v.split("-");
if(parts.length!==2) return null;

const months={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

let d = new Date(new Date().getFullYear(), months[parts[1].toLowerCase()], parseInt(parts[0]));
d.setHours(0,0,0,0); // important
return d;
}

/* ✅ SAFE DAY COMPARE */
function isSameDay(d1,d2){
return d1.getDate()===d2.getDate() && d1.getMonth()===d2.getMonth();
}

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{

const rows=data.split("\n").map(r=>r.split(","));
rows.splice(0,2);

let totalQty=0;
let cust={};

let html="<table><tr>\
<th>SI NO</th><th>CUSTOMER</th><th>SCHEDULE DATE</th>\
<th>ITEM CODE</th><th>ITEM NAME</th><th>PRODUCT</th>\
<th>MANAGER</th><th>SCH QTY</th><th>REMARKS</th><th>STATUS</th></tr>";

const today=new Date();
today.setHours(0,0,0,0);

const yesterday=new Date(today);
yesterday.setDate(today.getDate()-1);

rows.forEach(r=>{

if(r.length<9) return;

let customer=clean(r[1]);
let qty=parseInt(clean(r[7]));
let remark=clean(r[8]).toLowerCase();
let date=parseDate(r[2]);

if(!qty || !date) return;

/* ✅ FILTER FIXED */
if(!isSameDay(date,today) && !isSameDay(date,yesterday)){
return;
}

totalQty+=qty;

/* SUMMARY */
if(!cust[customer]) cust[customer]={sch:0,disp:0};
cust[customer].sch+=qty;
if(remark==="dispatched") cust[customer].disp+=qty;

/* TABLE */
let status="",cls="";
if(remark==="dispatched"){cls="dispatched";status="DISPATCHED";}
else if(date<today){cls="overdue";status="OVERDUE";}
else if(isSameDay(date,today)){cls="today";status="TODAY";}
else{cls="upcoming";status="UPCOMING";}

html+="<tr class='"+cls+"'>";

for(let i=0;i<9;i++){
if(i===8 && cls==="overdue"){
html+="<td class='blink'>"+clean(r[i])+"</td>";
}else{
html+="<td>"+clean(r[i])+"</td>";
}
}

html+="<td>"+status+"</td></tr>";

});

html+="</table>";

document.getElementById("tableContainer").innerHTML=html;
document.getElementById("totalQty").innerText="Total Qty: "+totalQty;

/* CHART */
let labels=Object.keys(cust);
let sch=labels.map(x=>cust[x].sch);
let disp=labels.map(x=>cust[x].disp);

new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:labels,
datasets:[
{label:'Scheduled',data:sch},
{label:'Dispatched',data:disp}
]
}
});

/* SUMMARY */
let sumHTML="<table class='summary-table'><tr>\
<th>Customer</th><th>Scheduled</th><th>Dispatched</th><th>OTD %</th></tr>";

labels.forEach(c=>{
let s=cust[c].sch;
let d=cust[c].disp;
let otd = s ? ((d/s)*100).toFixed(1) : 0;

sumHTML+=`<tr>
<td>${c}</td>
<td>${s}</td>
<td>${d}</td>
<td>${otd}%</td>
</tr>`;
});

sumHTML+="</table>";

document.getElementById("summaryContent").innerHTML=sumHTML;

/* AUTO SCROLL */
setInterval(()=>{
let c=document.getElementById("tableContainer");
c.scrollTop+=1;
if(c.scrollTop+c.clientHeight>=c.scrollHeight) c.scrollTop=0;
},50);

})
.catch(()=>{
document.getElementById("tableContainer").innerHTML="Error loading data";
});

</script>

</body>
</html>
