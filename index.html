<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; background:#f4f4f4; }

    h2 { text-align:center; }

    .summary {
      display:flex;
      justify-content: space-around;
      margin:20px 0;
      font-size:18px;
      font-weight:bold;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background:white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #222;
      color: white;
    }

    .ready, .dispatched {
      background: #28a745;
      color: white;
    }

    .pending {
      background: #dc3545;
      color: white;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    canvas {
      margin-top: 30px;
      background:white;
      padding:10px;
    }
  </style>
</head>

<body>

<h2>📦 Dispatch Dashboard</h2>

<div class="summary">
  <div>Scheduled: <span id="sch"></span></div>
  <div>Dispatched: <span id="disp"></span></div>
  <div>Pending: <span id="pend"></span></div>
</div>

<canvas id="mainChart"></canvas>
<canvas id="customerChart"></canvas>
<canvas id="dateChart"></canvas>

<table>
  <thead>
    <tr>
      <th>Customer</th>
      <th>Date</th>
      <th>Item</th>
      <th>Qty</th>
      <th>Remark</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

function formatDate(d) {
  return new Date(d).toLocaleDateString("en-GB");
}

function loadData() {

fetch(url)
.then(res => res.text())
.then(data => {

  const rows = data.split("\n").slice(1);

  let sch = 0, disp = 0, pend = 0;
  let customerMap = {};
  let todayDisp = 0, yesterdayDisp = 0;

  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  rows.forEach(r => {

    const c = r.split(",");
    if(c.length < 9) return;

    let customer = c[1];
    let date = c[2];
    let item = c[4];
    let qty = parseInt(c[7]) || 0;
    let remark = c[8].trim().toLowerCase();

    sch += qty;

    let isDispatched = remark === "dispatched";

    if(isDispatched) {
      disp += qty;

      let rowDate = new Date(date).toDateString();

      if(rowDate === today) todayDisp += qty;
      if(rowDate === yesterday) yesterdayDisp += qty;

    } else {
      pend += qty;
    }

    // Customer-wise
    if(!customerMap[customer]) customerMap[customer] = 0;
    if(isDispatched) customerMap[customer] += qty;

    // Row UI
    let tr = document.createElement("tr");

    let remarkClass = "";
    if(remark === "ready") remarkClass = "ready";
    else if(remark === "dispatched") remarkClass = "dispatched";
    else remarkClass = "pending";

    tr.innerHTML = `
      <td>${customer}</td>
      <td>${date}</td>
      <td>${item}</td>
      <td>${qty}</td>
      <td class="${remarkClass}">${remark}</td>
    `;

    tbody.appendChild(tr);

  });

  // Summary
  document.getElementById("sch").innerText = sch;
  document.getElementById("disp").innerText = disp;
  document.getElementById("pend").innerText = pend;

  // MAIN CHART
  new Chart(document.getElementById("mainChart"), {
    type: "bar",
    data: {
      labels: ["Scheduled", "Dispatched", "Pending"],
      datasets: [{
        data: [sch, disp, pend]
      }]
    }
  });

  // CUSTOMER CHART
  new Chart(document.getElementById("customerChart"), {
    type: "bar",
    data: {
      labels: Object.keys(customerMap),
      datasets: [{
        label: "Dispatched",
        data: Object.values(customerMap)
      }]
    }
  });

  // TODAY vs YESTERDAY
  new Chart(document.getElementById("dateChart"), {
    type: "bar",
    data: {
      labels: ["Today", "Yesterday"],
      datasets: [{
        data: [todayDisp, yesterdayDisp]
      }]
    }
  });

});

}

// Auto refresh every 60 sec
loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
