<!DOCTYPE html>
<html>
<head>
  <title>Dispatch TV Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      overflow: hidden;
    }

    .page {
      display: none;
      height: 100vh;
      padding: 10px;
    }

    .active {
      display: block;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      padding: 5px 20px;
    }

    /* TILE PAGE */
    .tiles {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 10px;
    }

    .tile {
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 20px;
    }

    .blue { background: #2563eb; }
    .green { background: #16a34a; }
    .red { background: #dc2626; }
    .orange { background: #ea580c; }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    /* TABLE PAGE */
    .table-container {
      height: 90vh;
      overflow: hidden;
      background: white;
      color: black;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
    }

    th {
      background: black;
      color: white;
      position: sticky;
      top: 0;
    }

    .ok { background: #22c55e; color: white; }
    .pending {
      background: #ef4444;
      color: white;
      animation: blink 1s infinite;
    }

    /* MATRIX PAGE */
    .matrix table {
      background: white;
      color: black;
      font-size: 12px;
    }

    .greenCell { background:#22c55e; color:white; }
    .redCell { background:#ef4444; color:white; }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

  </style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="topbar">
    <div>📦 Dispatch Dashboard</div>
    <div id="clock"></div>
  </div>

  <div class="tiles">
    <div class="tile blue">Total<br><span id="total"></span></div>
    <div class="tile green">Dispatched<br><span id="disp"></span></div>
    <div class="tile red">Pending<br><span id="pend"></span></div>
    <div class="tile orange">Today<br><span id="today"></span></div>
  </div>

  <h2 style="text-align:center">🎯 Achievement: <span id="percent"></span>%</h2>

  <div class="charts">
    <canvas id="chart1"></canvas>
    <canvas id="chart2"></canvas>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Customer</th>
          <th>Date</th>
          <th>Item</th>
          <th>Qty</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page matrix" id="page3">
  <table>
    <thead id="mhead"></thead>
    <tbody id="mbody"></tbody>
  </table>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText = new Date().toLocaleString();
},1000);

/* PAGE ROTATION */
let pages = document.querySelectorAll(".page");
let current = 0;

setInterval(()=>{
  pages[current].classList.remove("active");
  current = (current + 1) % pages.length;
  pages[current].classList.add("active");
},10000);

/* LOAD DATA */
fetch(url)
.then(res=>res.text())
.then(data=>{

  const rows = data.split("\n").slice(1);

  let total=0, disp=0, pend=0, today=0;
  let custMap={};
  let dataset={};

  const todayStr = new Date().toDateString();

  rows.forEach(r=>{
    let c=r.split(",");
    if(c.length<9) return;

    let customer=c[1];
    let date=c[2];
    let qty=parseInt(c[7])||0;
    let remark=c[8].toLowerCase();

    let isDis = remark==="dispatched";

    total+=qty;
    if(isDis){
      disp+=qty;
      if(new Date(date).toDateString()===todayStr) today+=qty;
    } else pend+=qty;

    if(!custMap[customer]) custMap[customer]=0;
    if(isDis) custMap[customer]+=qty;

    // table
    let tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${customer}</td>
      <td>${date}</td>
      <td>${c[4]}</td>
      <td>${qty}</td>
      <td class="${isDis?'ok':'pending'}">${remark}</td>
    `;
    document.getElementById("tbody").appendChild(tr);

    // matrix
    if(!dataset[customer]) dataset[customer]={};
    if(!dataset[customer][date]) dataset[customer][date]={sch:0,dis:0};

    dataset[customer][date].sch+=qty;
    if(isDis) dataset[customer][date].dis+=qty;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("disp").innerText=disp;
  document.getElementById("pend").innerText=pend;
  document.getElementById("today").innerText=today;

  document.getElementById("percent").innerText=
    total?((disp/total)*100).toFixed(1):0;

  new Chart(chart1,{type:"doughnut",
    data:{labels:["Dis","Pend"],datasets:[{data:[disp,pend]}]}
  });

  new Chart(chart2,{type:"bar",
    data:{labels:Object.keys(custMap),
    datasets:[{data:Object.values(custMap)}]}
  });

});

/* AUTO SCROLL TABLE */
let scroll=0;
setInterval(()=>{
  let c=document.querySelector(".table-container");
  scroll+=1;
  c.scrollTop=scroll;
  if(scroll>=c.scrollHeight-c.clientHeight) scroll=0;
},50);

/* AUTO REFRESH */
setInterval(()=>location.reload(),60000);

</script>

</body>
</html>
