<!DOCTYPE html>
<html>
<head>
<title>DISPATCH PENDING</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="300">

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  overflow:hidden;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 50px;
  background:rgba(255,255,255,0.08);
}

h1{
  font-size:40px;
  margin:0;
}

#totalQty{
  font-size:28px;
  background:rgba(255,255,255,0.2);
  padding:10px 25px;
  border-radius:30px;
  font-weight:bold;
}

#wrap{
  height:65vh;
  margin:20px 40px;
  padding:20px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:22px;
}

th{
  background:rgba(0,0,0,0.7);
  padding:12px;
}

td{
  padding:12px;
  text-align:center;
}

tr:nth-child(even){
  background:rgba(255,255,255,0.05);
}

.badge{
  padding:6px 15px;
  border-radius:20px;
  font-weight:bold;
}

.green{ background:#00c853; }
.red{ background:#ff1744; }

.today{
  background:#ffd600 !important;
  color:black;
}

.overdue{
  background:#b71c1c !important;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}
</style>

<script>

const SHEET_URL = "PASTE_YOUR_CSV_LINK_HERE";

function parseCSV(text){
  return text.split("\n").map(row => row.split(","));
}

function parseDate(v){
  if(!v) return null;
  const p=v.trim().split("-");
  if(p.length<2) return null;

  const day=parseInt(p[0]);
  const months={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const m=months[p[1].toLowerCase()];
  if(m===undefined) return null;

  return new Date(new Date().getFullYear(),m,day);
}

fetch(SHEET_URL)
.then(r=>r.text())
.then(txt=>{

  const data=parseCSV(txt.trim());
  data.shift(); // remove header only

  let total=0;
  let rows=[];
  const today=new Date();
  today.setHours(0,0,0,0);

  data.forEach(r=>{
    const qty=parseInt(r[5]);
    const date=parseDate(r[6]);

    if(isNaN(qty)||!date) return;

    total+=qty;
    rows.push([r,date]);
  });

  rows.sort((a,b)=>a[1]-b[1]);

  document.getElementById("totalQty").innerText="Total Qty: "+total;

  let html="<table><tr>"+
  "<th>Sl No</th><th>Customer</th><th>Item Code</th>"+
  "<th>Item Name</th><th>Product</th><th>Qty</th>"+
  "<th>Dispatch Date</th><th>Status</th></tr>";

  rows.forEach(x=>{
    const r=x[0], d=x[1];
    let rowClass="", badge="";

    if(d < today){
      rowClass="overdue";
      badge=`<span class="badge red">OVERDUE</span>`;
    } else if(d.getTime()===today.getTime()){
      rowClass="today";
      badge=`<span class="badge green">TODAY</span>`;
    } else{
      badge=`<span class="badge green">UPCOMING</span>`;
    }

    html+=`<tr class="${rowClass}">
    <td>${r[0]}</td>
    <td>${r[1]}</td>
    <td>${r[2]}</td>
    <td>${r[3]}</td>
    <td>${r[4]}</td>
    <td>${r[5]}</td>
    <td>${r[6]}</td>
    <td>${badge}</td>
    </tr>`;
  });

  html+="</table>";

  document.getElementById("scroll").innerHTML=html;

});
</script>
</head>

<body>

<header>
  <h1>DISPATCH PENDING</h1>
  <div id="totalQty">Loading...</div>
</header>

<div id="wrap">
  <div id="scroll"></div>
</div>

</body>
</html>
