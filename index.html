<!DOCTYPE html>
<html>
<head>
<title>DAILY DISPATCH PLAN</title>
<meta http-equiv="refresh" content="300">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:30px 60px;
  background:rgba(255,255,255,0.08);
}

h1{
  margin:0;
  font-size:48px;
  letter-spacing:2px;
}

#totalQty{
  font-size:30px;
  background:rgba(255,255,255,0.2);
  padding:12px 25px;
  border-radius:30px;
  font-weight:bold;
}

/* TABLE CONTAINER */
#tableContainer{
  margin:30px 60px;
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  overflow:auto;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:28px;
  background:#ffffff;
  color:#000000;
}

th{
  background:#000000;
  color:#ffffff;
  position:sticky;
  top:0;
  font-size:28px;
  padding:18px;
}

td{
  padding:18px;
  text-align:center;
  border-bottom:1px solid #dddddd;
  color:#000000 !important;
}

/* STATUS COLORS */
.today{
  background:#ffeb3b !important;
  color:#000 !important;
  font-weight:bold;
}

.overdue{
  background:#c62828 !important;
  color:#fff !important;
  font-weight:bold;
}

.upcoming{
  background:#2e7d32 !important;
  color:#fff !important;
}

.error{
  color:red;
  font-size:24px;
}

</style>
</head>

<body>

<header>
  <h1>DAILY DISPATCH PLAN</h1>
  <div id="totalQty">Loading...</div>
</header>

<div id="tableContainer">Loading data...</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

function clean(v){
  return v ? v.replace(/"/g,'').trim() : "";
}

function parseDate(value){
  value = clean(value);
  if(!value) return null;

  const parts = value.split("-");
  if(parts.length !== 2) return null;

  const day = parseInt(parts[0]);

  const months = {
    jan:0,feb:1,mar:2,apr:3,may:4,jun:5,
    jul:6,aug:7,sep:8,oct:9,nov:10,dec:11
  };

  const month = months[parts[1].toLowerCase()];
  if(month === undefined) return null;

  const currentYear = new Date().getFullYear();
  return new Date(currentYear, month, day);
}

fetch(SHEET_URL)
.then(response => {
  if(!response.ok) throw new Error("Sheet not accessible");
  return response.text();
})
.then(data => {

  const rows = data.split("\n").map(r => r.split(","));
  rows.splice(0,2);

  let totalQty = 0;

  let html = "<table>";
  html += "<tr>\
  <th>SI NO</th>\
  <th>CUSTOMER</th>\
  <th>SCHEDULE DATE</th>\
  <th>ITEM CODE</th>\
  <th>ITEM NAME</th>\
  <th>PRODUCT</th>\
  <th>PROJECT PROGRAM MANAGER</th>\
  <th>SCH QTY</th>\
  <th>REMARKS</th>\
  <th>STATUS</th>\
  </tr>";

  const today = new Date();
  today.setHours(0,0,0,0);

  rows.forEach(r => {

    if(r.length < 9) return;
    if(!clean(r[0])) return;

    const qty = parseInt(clean(r[7]));
    const date = parseDate(r[2]);

    if(isNaN(qty) || !date) return;

    totalQty += qty;

    let status = "";
    let rowClass = "";

    if(date < today){
      status = "OVERDUE";
      rowClass = "overdue";
    }
    else if(date.getTime() === today.getTime()){
      status = "TODAY";
      rowClass = "today";
    }
    else{
      status = "UPCOMING";
      rowClass = "upcoming";
    }

    html += "<tr class='"+rowClass+"'>";

    // Show first 9 columns including REMARKS
    for(let i=0;i<9;i++){
      html += "<td>"+clean(r[i])+"</td>";
    }

    html += "<td>"+status+"</td></tr>";
  });

  html += "</table>";

  document.getElementById("tableContainer").innerHTML = html;
  document.getElementById("totalQty").innerText = "Total Qty: " + totalQty;

})
.catch(error => {
  document.getElementById("tableContainer").innerHTML = "<div class='error'>Unable to load Google Sheet. Check Publish settings.</div>";
  console.log(error);
});

</script>

</body>
</html>
