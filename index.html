```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dispatch TV</title>

<style>

body{
font-family: Arial, sans-serif;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
font-size:22px;
}

th,td{
border:1px solid #444;
padding:12px;
text-align:center;
}

th{
background:#222;
}

tr:nth-child(even){
background:#1b1b1b;
}

/* READY remark */
.ready{
background:#2e7d32 !important;
color:white;
font-weight:bold;
}

/* NOT READY remark */
.notready{
background:#c62828 !important;
color:white;
font-weight:bold;
}

/* DISPATCHED full row */
.dispatched td{
background:#00c853 !important;
color:white !important;
font-weight:bold;
}

</style>
</head>

<body>

<h1>DISPATCH STATUS</h1>

<table>
<thead>
<tr>
<th>ORDER</th>
<th>STYLE</th>
<th>COLOR</th>
<th>QTY</th>
<th>DATE</th>
<th>REMARKS</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const sheetURL =
"https://opensheet.elk.sh/YOUR_SHEET_ID/Sheet1";

function loadData(){

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(r=>{

let order = r.Order || "";
let style = r.Style || "";
let color = r.Color || "";
let qty = r.Qty || "";
let date = r.Date || "";

let remark = (r.Remarks || "").toString().toLowerCase().trim();

let rowClass="";
let remarkClass="";

if(remark.includes("dispatched")){
rowClass="dispatched";
}
else if(remark.includes("ready")){
remarkClass="ready";
}
else{
remarkClass="notready";
}

html += `
<tr class="${rowClass}">
<td>${order}</td>
<td>${style}</td>
<td>${color}</td>
<td>${qty}</td>
<td>${date}</td>
<td class="${remarkClass}">${remark.toUpperCase()}</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML = html;

});

}

loadData();

/* auto refresh every 10 sec */
setInterval(loadData,10000);

</script>

</body>
</html>
