<!DOCTYPE html>
<html>
<head>
  <title>Dispatch One Page Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      font-size: 18px;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .tile {
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
    }

    .blue { background: #2563eb; }
    .green { background: #16a34a; }
    .red { background: #dc2626; }
    .orange { background: #ea580c; }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .table-container {
      height: 200px;
      overflow: hidden;
      margin: 10px;
      background: white;
      color: black;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 5px;
      text-align: center;
    }

    th {
      background: black;
      color: white;
      position: sticky;
      top: 0;
    }

    .ok { background: #22c55e; color: white; }
    .pending {
      background: #ef4444;
      color: white;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    .matrix {
      margin: 10px;
      background: white;
      color: black;
      overflow-x: auto;
    }

    .matrix table {
      font-size: 11px;
    }

    .greenCell { background:#22c55e; color:white; }
    .redCell { background:#ef4444; color:white; }

  </style>
</head>

<body>

<div class="topbar">
  <div>📦 Dispatch Dashboard</div>
  <div id="clock"></div>
</div>

<div class="tiles">
  <div class="tile blue">Total<br><span id="total"></span></div>
  <div class="tile green">Dispatched<br><span id="disp"></span></div>
  <div class="tile red">Pending<br><span id="pend"></span></div>
  <div class="tile orange">Today<br><span id="today"></span></div>
</div>

<h3 style="text-align:center">🎯 Achievement: <span id="percent"></span>%</h3>

<div class="charts">
  <canvas id="chart1"></canvas>
  <canvas id="chart2"></canvas>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Customer</th>
        <th>Date</th>
        <th>Item</th>
        <th>Qty</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="matrix">
  <table>
    <thead id="mhead"></thead>
    <tbody id="mbody"></tbody>
  </table>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText=new Date().toLocaleString();
},1000);

function getLast7Days(){
  let d=[];
  for(let i=6;i>=0;i--){
    let dt=new Date();
    dt.setDate(dt.getDate()-i);
    d.push(dt.toLocaleDateString("en-GB",{day:'numeric',month:'short'}));
  }
  return d;
}

fetch(url)
.then(res=>res.text())
.then(data=>{

  const rows=data.split("\n").slice(1);

  let total=0,disp=0,pend=0,today=0;
  let custMap={},dataset={};

  const todayStr=new Date().toDateString();
  const lastDays=getLast7Days();

  rows.forEach(r=>{
    let c=r.split(",");
    if(c.length<9) return;

    let customer=c[1];
    let date=c[2];
    let qty=parseInt(c[7])||0;
    let remark=c[8].toLowerCase();

    let isDis=remark==="dispatched";

    total+=qty;
    if(isDis){
      disp+=qty;
      if(new Date(date).toDateString()===todayStr) today+=qty;
    } else pend+=qty;

    if(!custMap[customer]) custMap[customer]=0;
    if(isDis) custMap[customer]+=qty;

    // TABLE
    let tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${customer}</td>
      <td>${date}</td>
      <td>${c[4]}</td>
      <td>${qty}</td>
      <td class="${isDis?'ok':'pending'}">${remark}</td>
    `;
    document.getElementById("tbody").appendChild(tr);

    // MATRIX
    if(!lastDays.includes(date)) return;

    if(!dataset[customer]) dataset[customer]={};
    if(!dataset[customer][date]) dataset[customer][date]={sch:0,dis:0};

    dataset[customer][date].sch+=qty;
    if(isDis) dataset[customer][date].dis+=qty;
  });

  // KPIs
  document.getElementById("total").innerText=total;
  document.getElementById("disp").innerText=disp;
  document.getElementById("pend").innerText=pend;
  document.getElementById("today").innerText=today;
  document.getElementById("percent").innerText=
    total?((disp/total)*100).toFixed(1):0;

  // CHARTS
  new Chart(chart1,{type:"doughnut",
    data:{labels:["Dispatched","Pending"],
    datasets:[{data:[disp,pend]}]}
  });

  new Chart(chart2,{type:"bar",
    data:{labels:Object.keys(custMap),
    datasets:[{data:Object.values(custMap)}]}
  });

  // MATRIX HEADER
  let h1="<tr><th rowspan='2'>Customer</th>";
  lastDays.forEach(d=>h1+=`<th colspan='2'>${d}</th>`);
  h1+="</tr>";

  let h2="<tr>";
  lastDays.forEach(()=>h2+="<th>S</th><th>D</th>");
  h2+="</tr>";

  document.getElementById("mhead").innerHTML=h1+h2;

  // MATRIX BODY
  let body="";
  Object.keys(dataset).forEach(cust=>{
    let row=`<tr><td>${cust}</td>`;
    lastDays.forEach(d=>{
      let sch=dataset[cust]?.[d]?.sch||"-";
      let dis=dataset[cust]?.[d]?.dis||"-";

      let cls="";
      if(sch!="-"){
        cls=(dis>=sch)?"greenCell":"redCell";
      }

      row+=`<td>${sch}</td><td class="${cls}">${dis}</td>`;
    });
    row+="</tr>";
    body+=row;
  });

  document.getElementById("mbody").innerHTML=body;

});

// AUTO SCROLL
let scroll=0;
setInterval(()=>{
  let c=document.querySelector(".table-container");
  scroll+=1;
  c.scrollTop=scroll;
  if(scroll>=c.scrollHeight-c.clientHeight) scroll=0;
},50);

// AUTO REFRESH
setInterval(()=>location.reload(),60000);

</script>

</body>
</html>
