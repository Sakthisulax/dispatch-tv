<!DOCTYPE html>
<html>
<head>
<title>DAILY DISPATCH PLAN</title>
<meta http-equiv="refresh" content="300">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(255,255,255,0.08);
}

h1{margin:0;}

#totalQty{
  font-size:18px;
  background:rgba(255,255,255,0.2);
  padding:6px 15px;
  border-radius:20px;
}

#tableContainer{
  margin:20px 40px;
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

th{background:#000;}

.today{background:#ffd600;color:black;}
.overdue{background:#c62828;}
.upcoming{background:#2e7d32;}

</style>
</head>

<body>

<header>
  <h1>DAILY DISPATCH PLAN</h1>
  <div id="totalQty">Loading...</div>
</header>

<div id="tableContainer">Loading data...</div>

<script>

// YOUR GOOGLE PUBLISHED CSV
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

// CORS PROXY (important)
const finalURL = "https://api.allorigins.win/raw?url=" + encodeURIComponent(sheetURL);

function clean(v){
  return v ? v.replace(/"/g,'').trim() : "";
}

function parseDate(value){
  value = clean(value);
  if(!value) return null;

  const parts = value.split("-");
  if(parts.length !== 2) return null;

  const day = parseInt(parts[0]);
  const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const month = months[parts[1].toLowerCase()];
  if(month === undefined) return null;

  return new Date(2026, month, day);
}

fetch(finalURL)
.then(res => res.text())
.then(data => {

  const rows = data.split("\n").map(r => r.split(","));
  rows.splice(0,2);

  let totalQty = 0;

  let html = "<table><tr><th>SI NO</th><th>CUSTOMER</th><th>SCHEDULE DATE</th><th>ITEM CODE</th><th>ITEM NAME</th><th>PRODUCT</th><th>PROJECT MANAGER</th><th>SCH QTY</th><th>STATUS</th></tr>";

  const today = new Date();
  today.setHours(0,0,0,0);

  rows.forEach(r=>{
    if(r.length < 8) return;
    if(!clean(r[0])) return;

    const qty = parseInt(clean(r[7]));
    const date = parseDate(r[2]);
    if(isNaN(qty) || !date) return;

    totalQty += qty;

    let status="", rowClass="";

    if(date < today){ status="OVERDUE"; rowClass="overdue"; }
    else if(date.getTime()===today.getTime()){ status="TODAY"; rowClass="today"; }
    else{ status="UPCOMING"; rowClass="upcoming"; }

    html += "<tr class='"+rowClass+"'>";
    for(let i=0;i<8;i++){
      html += "<td>"+clean(r[i])+"</td>";
    }
    html += "<td>"+status+"</td></tr>";
  });

  html += "</table>";

  document.getElementById("tableContainer").innerHTML = html;
  document.getElementById("totalQty").innerText = "Total Qty: "+totalQty;

})
.catch(err=>{
  document.getElementById("tableContainer").innerHTML="Error loading data.";
  console.log(err);
});

</script>

</body>
</html>
