<!DOCTYPE html>
<html>
<head>
    <title>Dispatch TV</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: Arial;
        }

        h1 {
            text-align: center;
            margin: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 22px;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #111;
        }

        /* 🔥 SMALL GRAPH BOX */
        .graph-box {
            position: fixed;
            right: 10px;
            bottom: 10px;
            width: 350px;
            height: 200px;
            background: #111;
            border-radius: 10px;
            padding: 10px;
        }

        /* 🔥 SMALL % BOX */
        .percent-box {
            position: fixed;
            right: 10px;
            bottom: 220px;
            background: #111;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            color: #00ffcc;
        }
    </style>
</head>

<body>

<h1>Daily Dispatch Plan</h1>

<!-- YOUR TABLE -->
<table id="dispatchTable">
    <tr>
        <th>Date</th>
        <th>Planned</th>
        <th>Actual</th>
    </tr>

    <tr><td>Mon</td><td>120</td><td>100</td></tr>
    <tr><td>Tue</td><td>150</td><td>140</td></tr>
    <tr><td>Wed</td><td>130</td><td>120</td></tr>
    <tr><td>Thu</td><td>170</td><td>150</td></tr>
    <tr><td>Fri</td><td>160</td><td>155</td></tr>
</table>

<!-- 🔥 ACHIEVEMENT -->
<div class="percent-box" id="achievementBox">
    Achievement: --
</div>

<!-- 🔥 SMALL GRAPH -->
<div class="graph-box">
    <canvas id="smallChart"></canvas>
</div>

<script>

// GET DATA FROM TABLE
function getTableData() {
    let table = document.getElementById("dispatchTable");
    let labels = [];
    let planned = [];
    let actual = [];

    for (let i = 1; i < table.rows.length; i++) {
        labels.push(table.rows[i].cells[0].innerText);
        planned.push(parseInt(table.rows[i].cells[1].innerText));
        actual.push(parseInt(table.rows[i].cells[2].innerText));
    }

    return { labels, planned, actual };
}

const data = getTableData();


// SMALL GRAPH (LINE - CLEAN LOOK)
new Chart(document.getElementById("smallChart"), {
    type: "line",
    data: {
        labels: data.labels,
        datasets: [
            {
                label: "P",
                data: data.planned,
                borderColor: "#3498db",
                tension: 0.3
            },
            {
                label: "A",
                data: data.actual,
                borderColor: "#2ecc71",
                tension: 0.3
            }
        ]
    },
    options: {
        plugins: {
            legend: {
                labels: {
                    color: "white",
                    font: { size: 10 }
                }
            }
        },
        scales: {
            x: {
                ticks: {
                    color: "white",
                    font: { size: 10 }
                }
            },
            y: {
                ticks: {
                    color: "white",
                    font: { size: 10 }
                }
            }
        }
    }
});


// CALCULATE %
let totalPlanned = data.planned.reduce((a,b)=>a+b,0);
let totalActual = data.actual.reduce((a,b)=>a+b,0);

let percent = ((totalActual / totalPlanned) * 100).toFixed(1);

document.getElementById("achievementBox").innerText =
    "Achievement: " + percent + "%";


// AUTO REFRESH (TV)
setInterval(() => {
    location.reload();
}, 60000);

</script>

</body>
</html>
