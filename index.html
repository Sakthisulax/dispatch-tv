<!DOCTYPE html>
<html>
<head>
<title>DAILY DISPATCH PLAN</title>
<meta http-equiv="refresh" content="300">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 60px;
background:rgba(255,255,255,0.08);
}

h1{
margin:0;
font-size:48px;
letter-spacing:2px;
}

#totalQty{
font-size:30px;
background:rgba(255,255,255,0.2);
padding:12px 25px;
border-radius:30px;
font-weight:bold;
}

#tableContainer{
margin:30px 60px;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
overflow:hidden;
height:70vh;
}

table{
width:100%;
border-collapse:collapse;
font-size:28px;
background:#ffffff;
color:#000000;
}

th{
background:#000000;
color:#ffffff;
position:sticky;
top:0;
font-size:28px;
padding:18px;
}

td{
padding:18px;
text-align:center;
border-bottom:1px solid #dddddd;
color:#000000 !important;
}

/* STATUS COLORS */

.today{
background:#ffeb3b !important;
color:#000 !important;
font-weight:bold;
}

.overdue{
background:#c62828 !important;
color:#fff !important;
font-weight:bold;
animation:blinkRow 1s infinite;
}

.upcoming{
background:#2e7d32 !important;
color:#fff !important;
}

/* DISPATCHED FULL ROW */

.dispatched{
background:#00c853 !important;
color:#ffffff !important;
font-weight:bold;
}

/* BLINK */

@keyframes blinkRow{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

.error{
color:red;
font-size:24px;
}

</style>
</head>

<body>

<header>
<h1>DAILY DISPATCH PLAN</h1>
<div id="totalQty">Loading...</div>
</header>

<div id="tableContainer">Loading data...</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

function clean(v){
return v ? v.replace(/"/g,'').trim() : "";
}

function parseDate(value){

value=clean(value);
if(!value) return null;

const parts=value.split("-");
if(parts.length!==2) return null;

const day=parseInt(parts[0]);

const months={
jan:0,feb:1,mar:2,apr:3,may:4,jun:5,
jul:6,aug:7,sep:8,oct:9,nov:10,dec:11
};

const month=months[parts[1].toLowerCase()];
if(month===undefined) return null;

const currentYear=new Date().getFullYear();
return new Date(currentYear,month,day);

}

fetch(SHEET_URL)

.then(response=>{
if(!response.ok) throw new Error("Sheet not accessible");
return response.text();
})

.then(data=>{

const rows=data.split("\n").map(row=>{

const result=[];
let current='';
let insideQuotes=false;

for(let char of row){

if(char==='"'){
insideQuotes=!insideQuotes;
}

else if(char===',' && !insideQuotes){
result.push(current);
current='';
}

else{
current+=char;
}

}

result.push(current);
return result;

});

rows.splice(0,2);

let totalQty=0;

let html="<table>";

html+="<tr>\
<th>SI NO</th>\
<th>CUSTOMER</th>\
<th>SCHEDULE DATE</th>\
<th>ITEM CODE</th>\
<th>ITEM NAME</th>\
<th>PRODUCT</th>\
<th>PROJECT PROGRAM MANAGER</th>\
<th>SCH QTY</th>\
<th>REMARKS</th>\
<th>STATUS</th>\
</tr>";

const today=new Date();
today.setHours(0,0,0,0);

rows.forEach(r=>{

if(r.length<9) return;
if(!clean(r[0])) return;

const qty=parseInt(clean(r[7]));
const date=parseDate(r[2]);

if(isNaN(qty)||!date) return;

totalQty+=qty;

let remark=clean(r[8]).toLowerCase().trim();

let status="";
let rowClass="";

if(remark==="dispatched"){

rowClass="dispatched";
status="DISPATCHED";

}

else if(date<today){

status="OVERDUE";
rowClass="overdue";

}

else if(date.getTime()===today.getTime()){

status="TODAY";
rowClass="today";

}

else{

status="UPCOMING";
rowClass="upcoming";

}

html+="<tr class='"+rowClass+"'>";

for(let i=0;i<9;i++){

let value=clean(r[i]);

if(i===8){

let v=value.toLowerCase().trim();

if(v==="ready"){

html+="<td style='background:#2ecc71 !important;color:white;font-weight:bold;'>"+value+"</td>";

}

else if(v==="dispatched"){

html+="<td style='background:#00c853 !important;color:white;font-weight:bold;'>"+value+"</td>";

}

else{

html+="<td style='background:#e74c3c !important;color:white;font-weight:bold;'>"+value+"</td>";

}

}

else{

html+="<td>"+value+"</td>";

}

}

html+="<td>"+status+"</td></tr>";

});

html+="</table>";

document.getElementById("tableContainer").innerHTML=html;
document.getElementById("totalQty").innerText="Total Qty: "+totalQty;

startAutoScroll();

})

.catch(error=>{
document.getElementById("tableContainer").innerHTML="<div class='error'>Unable to load Google Sheet</div>";
console.log(error);
});

function startAutoScroll(){

const container=document.getElementById("tableContainer");

let scrollSpeed=1;

setInterval(function(){

container.scrollTop+=scrollSpeed;

if(container.scrollTop+container.clientHeight>=container.scrollHeight){
container.scrollTop=0;
}

},50);

}

</script>

</body>
</html>
